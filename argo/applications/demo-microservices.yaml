apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-microservices
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/speedscale/demo
    targetRevision: HEAD
    path: scenarios/microservices/overlays/speedscale
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-stack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
