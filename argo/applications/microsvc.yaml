apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microsvc
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/speedscale/microsvc
    targetRevision: HEAD
    path: kubernetes/overlays/speedscale
  destination:
    server: https://kubernetes.default.svc
    namespace: banking-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
