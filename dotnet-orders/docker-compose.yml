services:
  dotnet-orders:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dotnet-orders
    restart: always
    ports:
      - "8082:8082"
    environment:
      ASPNETCORE_URLS: http://+:8082
      ASPNETCORE_ENVIRONMENT: Production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
