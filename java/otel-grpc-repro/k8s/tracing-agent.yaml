apiVersion: v1
kind: ConfigMap
metadata:
  name: tracing-agent-conf
  namespace: tracing
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317

    processors:
      batch: {}

    exporters:
      debug:
        verbosity: detailed

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracing-agent
  namespace: tracing
  labels:
    app: tracing-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracing-agent
  template:
    metadata:
      labels:
        app: tracing-agent
    spec:
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.120.0
          args:
            - --config=/conf/otel-collector-config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: health
              containerPort: 13133
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /conf
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: tracing-agent-conf
---
apiVersion: v1
kind: Service
metadata:
  name: tracing-agent
  namespace: tracing
spec:
  selector:
    app: tracing-agent
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
