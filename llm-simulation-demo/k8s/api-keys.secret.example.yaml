# Copy this file to api-keys.secret.yaml and fill in your keys.
# DO NOT commit api-keys.secret.yaml — it is listed in .gitignore.
#
# Alternatively, run:
#   ./configure-keys.sh
# to create the Secret from environment variables without touching YAML files.
#
# Supported providers:
#   openai      https://platform.openai.com/api-keys
#   anthropic   https://console.anthropic.com/settings/keys
#   gemini      https://aistudio.google.com/app/apikey
#   cohere      https://dashboard.cohere.com/api-keys
#   mistral     https://console.mistral.ai/api-keys
#
# Leave unused provider keys as empty strings — the backend will skip them.
apiVersion: v1
kind: Secret
metadata:
  name: llm-api-keys
  namespace: llm-simulation
type: Opaque
stringData:
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GEMINI_API_KEY: ""
  COHERE_API_KEY: ""
  MISTRAL_API_KEY: ""
