apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-simulation-backend
  namespace: llm-simulation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-simulation-backend
  template:
    metadata:
      labels:
        app: llm-simulation-backend
    spec:
      containers:
        - name: backend
          image: gcr.io/speedscale-demos/llm-simulation-backend:v1.3.7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          # Non-sensitive runtime config from ConfigMap
          envFrom:
            - configMapRef:
                name: llm-simulation-config
          # API keys from Secret — only the keys that exist in the Secret are injected
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: OPENAI_API_KEY
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: GEMINI_API_KEY
                  optional: true
            - name: XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: XAI_API_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: llm-simulation-backend
  namespace: llm-simulation
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000
  selector:
    app: llm-simulation-backend
