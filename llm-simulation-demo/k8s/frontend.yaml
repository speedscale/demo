apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-simulation-frontend
  namespace: llm-simulation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-simulation-frontend
  template:
    metadata:
      labels:
        app: llm-simulation-frontend
    spec:
      containers:
        - name: frontend
          image: gcr.io/speedscale-demos/llm-simulation-frontend:v1.3.5
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "http://llm-simulation-backend"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: llm-simulation-frontend
  namespace: llm-simulation
spec:
  # Use NodePort for easy local access with minikube/kind.
  # Change to LoadBalancer for cloud clusters.
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 3000
      nodePort: 30300
  selector:
    app: llm-simulation-frontend
---
