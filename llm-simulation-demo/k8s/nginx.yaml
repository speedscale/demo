apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-simulation-nginx-conf
  namespace: llm-simulation
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 80;
        location / {
          proxy_pass         http://llm-simulation-frontend:3000;
          proxy_http_version 1.1;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   Upgrade           $http_upgrade;
          proxy_set_header   Connection        "upgrade";
          proxy_read_timeout 120s;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-simulation-nginx
  namespace: llm-simulation
  annotations:
    sidecar.speedscale.com/inject: "true"
    sidecar.speedscale.com/tls-out: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-simulation-nginx
  template:
    metadata:
      labels:
        app: llm-simulation-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: llm-simulation-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: llm-simulation-nginx
  namespace: llm-simulation
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 3000
      targetPort: 80
  selector:
    app: llm-simulation-nginx
