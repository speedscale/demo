apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: observability
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Daemon        Off
        Log_Level     info

    [INPUT]
        Name          opentelemetry
        Listen        0.0.0.0
        Port          4318
        Tag           speedscale.otel

    [FILTER]
        Name          modify
        Match         *
        Add           source speedscale

    [OUTPUT]
        Name                  es
        Match                 *
        Host                  elasticsearch.observability.svc.cluster.local
        Port                  9200
        Index                 speedscale-rrpair-fluentbit
        Logstash_Format       On
        Logstash_Prefix       speedscale-rrpair-fluentbit
        Suppress_Type_Name    On
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluent-bit
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      containers:
        - name: fluent-bit
          image: cr.fluentbit.io/fluent/fluent-bit:3.1.8
          args:
            - -c
            - /fluent-bit/etc/fluent-bit.conf
          ports:
            - containerPort: 4318
              name: otlp-http
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
      volumes:
        - name: config
          configMap:
            name: fluent-bit-config
---
apiVersion: v1
kind: Service
metadata:
  name: fluent-bit
  namespace: observability
spec:
  selector:
    app: fluent-bit
  ports:
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: 4318
