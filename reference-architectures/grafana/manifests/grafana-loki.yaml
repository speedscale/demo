apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: observability
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

    limits_config:
      allow_structured_metadata: false
      # Demo cluster — age RRPair logs out fast so the PVC doesn't fill up
      # if someone leaves a load test running. Compactor below enforces it.
      retention_period: 24h

    compactor:
      working_directory: /loki/compactor
      shared_store: filesystem
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 1h
      retention_delete_worker_count: 50

    ruler:
      alertmanager_url: http://localhost:9093
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: observability
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: observability
spec:
  replicas: 1
  strategy:
    # Recreate (not RollingUpdate) — PVC is RWO so a second pod can't mount it.
    type: Recreate
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
      containers:
        - name: loki
          image: grafana/loki:2.9.8
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - containerPort: 3100
              name: http
          volumeMounts:
            - name: loki-config
              mountPath: /etc/loki
            - name: loki-data
              mountPath: /loki
      volumes:
        - name: loki-config
          configMap:
            name: loki-config
        - name: loki-data
          persistentVolumeClaim:
            claimName: loki-data
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: observability
spec:
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki.observability.svc.cluster.local:3100
        isDefault: true
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.observability.svc.cluster.local:9090
        isDefault: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: observability
data:
  providers.yaml: |
    apiVersion: 1
    providers:
      - name: speedscale-byoc
        orgId: 1
        folder: Speedscale BYOC
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
data:
  speedscale-byoc.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "type": "stat",
          "title": "Speedscale scrape targets up",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum by (job) (up{job=~\"speedscale-.*\"})", "legendFormat": "{{job}}", "refId": "A" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" }, "colorMode": "value", "graphMode": "none" },
          "fieldConfig": { "defaults": { "mappings": [{ "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }] }, "overrides": [] }
        },
        {
          "type": "stat",
          "title": "Forwarder messages queued",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum(messages_queued)", "refId": "A" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area" }
        },
        {
          "type": "stat",
          "title": "Nettap active connections",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum(conn_active{job=\"speedscale-nettap\"})", "refId": "A" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area" }
        },
        {
          "type": "timeseries",
          "title": "Forwarder throughput (per-second rates)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum(rate(messages_filtered_total[1m]))", "legendFormat": "messages filtered/sec", "refId": "A" },
            { "expr": "sum(rate(err_queueFull_total[5m]))", "legendFormat": "queue-full errors/sec", "refId": "B" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Nettap connection activity",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "conn_active{job=\"speedscale-nettap\"}", "legendFormat": "{{instance}}", "refId": "A" }]
        },
        {
          "type": "logs",
          "title": "Speedscale RRPair logs (Loki)",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 12 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{ "expr": "{cluster=\"miniken\"} |= \"\"", "refId": "A" }]
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["speedscale", "byoc"],
      "templating": { "list": [] },
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Speedscale BYOC",
      "uid": "speedscale-byoc",
      "version": 2,
      "weekStart": ""
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: observability
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability
spec:
  replicas: 1
  strategy:
    # Recreate (not RollingUpdate) because the PVC is RWO — a rolling
    # update would create a second pod that can't mount the volume.
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.1.4
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            # Keep sessions across pod restarts (default 7 days). Pair
            # with the PVC so user-created dashboards survive too.
            - name: GF_SECURITY_LOGIN_REMEMBER_DAYS
              value: "30"
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              # NOTE: mounting INSIDE /var/lib/grafana works because Grafana
              # only watches this subdir for file-provider dashboards; the
              # SQLite DB lives at /var/lib/grafana/grafana.db (on the PVC).
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
