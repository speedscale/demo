# ServiceEntries required for REGISTRY_ONLY Istio egress policy.
# Covers all external APIs called by the demo-stack services.
apiVersion: networking.istio.io/v1alpha3
kind: ServiceEntry
metadata:
  name: external-spacexdata
  namespace: demo-stack
spec:
  hosts:
  - api.spacexdata.com
  ports:
  - number: 443
    name: https
    protocol: HTTPS
  location: MESH_EXTERNAL
  resolution: DNS
---
