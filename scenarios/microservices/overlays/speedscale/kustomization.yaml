apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../k8s
- external-services.yaml

patches:
# Add Istio injection and Speedscale labels to the namespace
- target:
    version: v1
    kind: Namespace
    name: demo-stack
  patch: |-
    - op: add
      path: /metadata/labels/istio-injection
      value: enabled
    - op: add
      path: /metadata/labels/speedscale
      value: "true"
# Disable Speedscale sidecar webhook on all Deployments — prevents the admission
# webhook from conflicting with Istio's own sidecar. eBPF capture
# (capture.speedscale.com/enabled) is already set per-service in the base manifests.
- target:
    group: apps
    version: v1
    kind: Deployment
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: irrelevant
      annotations:
        sidecar.speedscale.com/inject: "false"
